{% extends 'base.html' %}

{% block contenido %}

<div class="card">

    <div class="card-header">

        <h3 class="card-title">
            Gestión de Docentes
        </h3>

    </div>

        <hr>

        <table class="table table-bordered table-striped">

            <thead>

                <tr>
                     <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Estado</th>
                </tr>

            </thead>

            <tbody>

                {% for docente in docentes %}

                    <tr>

                        <td>{{ docente[0] }}</td>

                        <td>{{ docente[1] }}</td>

                        <td>{{ docente[2] }}</td>

                        <td>

                            {% if docente[3] == 1 %}
                                <span class="badge badge-success">
                                    Activo
                                </span>
                            {% else %}
                                <span class="badge badge-danger">
                                    Inactivo
                                </span>
                            {% endif %}

                        </td>

                    </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
