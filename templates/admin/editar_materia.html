{% extends 'base.html' %}

{% block contenido %}

<div class="card">

    <div class="card-header">

        <h3 class="card-title">

            Editar Materia

        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-2">

                    <label>Clave</label>

                    <input
                        type="text"
                        name="clave"
                        value="{{ materia[1] }}"
                        class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Nombre</label>

                    <input
                        type="text"
                        name="nombre"
                        value="{{ materia[2] }}"
                        class="form-control">

                </div>

                <div class="col-md-2">

                    <label>Horas Teóricas</label>

                    <input
                        type="number"
                        name="horas_teoricas"
                        value="{{ materia[3] }}"
                        class="form-control">

                </div>

                <div class="col-md-2">

                    <label>Horas Prácticas</label>

                    <input
                        type="number"
                        name="horas_practicas"
                        value="{{ materia[4] }}"
                        class="form-control">

                </div>

                <div class="col-md-2">

                    <label>Semestre</label>

                    <input
                        type="number"
                        name="semestre"
                        value="{{ materia[5] }}"
                        class="form-control">

                </div>

            </div>

            <br>

            <button class="btn btn-success">

                Guardar Cambios

            </button>

            <a
                href="/materias"
                class="btn btn-secondary">

                Regresar

            </a>

        </form>

    </div>

</div>

{% endblock %}
