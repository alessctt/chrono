<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Chrono</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='plugins/fontawesome-free/css/all.min.css') }}">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='dist/css/adminlte.min.css') }}">

</head>

<body class="hold-transition sidebar-mini">

<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">

        <ul class="navbar-nav">

            <li class="nav-item">

                <a class="nav-link" data-widget="pushmenu" href="#">

                    <i class="fas fa-bars"></i>

                </a>

            </li>

        </ul>

    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">

        <a href="/planeador" class="brand-link">

            <span class="brand-text font-weight-light">

                Chrono

            </span>

        </a>

        <div class="sidebar">

            <nav class="mt-2">

                <ul class="nav nav-pills nav-sidebar flex-column"
                    data-widget="treeview"
                    role="menu">

                    <li class="nav-item">

                        <a href="/planeador" class="nav-link">

                            <i class="nav-icon fas fa-home"></i>

                            <p>Inicio</p>

                        </a>

                    </li>

                    <li class="nav-item">

                        <a href="/gestion_horarios" class="nav-link">

                            <i class="nav-icon fas fa-calendar-alt"></i>

                            <p>Gestión de Horarios</p>

                        </a>

                    </li>

                    <li class="nav-item">

                        <a href="/vista_preliminar" class="nav-link">

                            <i class="nav-icon fas fa-table"></i>

                            <p>Vista Preliminar</p>

                        </a>

                    </li>

                    <li class="nav-item">

                        <a href="/logout" class="nav-link">

                            <i class="nav-icon fas fa-sign-out-alt"></i>

                            <p>Cerrar sesión</p>

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </aside>

    <!-- Contenido -->

    <div class="content-wrapper">

        <section class="content pt-3">

            <div class="container-fluid">

                {% block contenido %}
                {% endblock %}

            </div>

        </section>

    </div>

</div>

<script src="{{ url_for('static', filename='plugins/jquery/jquery.min.js') }}"></script>

<script src="{{ url_for('static', filename='plugins/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

<script src="{{ url_for('static', filename='dist/js/adminlte.min.js') }}"></script>

</body>

</html>
