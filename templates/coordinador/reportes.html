{% extends "coordinador/base_cor.html" %}

{% block contenido %}

<div class="card">

    <div class="card-header">

        <h3 class="card-title">

            Reportes Académicos

        </h3>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-3">

                <label>Tipo</label>

                <select class="form-control">

                    <option>Docente</option>

                    <option>Aula</option>

                    <option>Grupo</option>

                </select>

            </div>

            <div class="col-md-3">

                <label>Filtro</label>

                <input
                    type="text"
                    class="form-control">

            </div>

            <div class="col-md-3 d-flex align-items-end">

                <button class="btn btn-success">

                    <i class="fas fa-file-excel"></i>

                    Exportar Excel

                </button>

            </div>

        </div>

        <hr>

        <table class="table table-bordered">

            <thead>

                <tr>

                    <th>Resultado</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td class="text-center">

                        No hay información para mostrar.

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
